ODROIDGO3-UBOOT-CONFIG

# Memory Map (Standard RK3326 Handheld Layout)
setenv kernel_addr_r  0x02000000
setenv fdt_addr_r     0x01f00000
setenv ramdisk_addr_r 0x04000000

# Stability Settings
setenv fdt_high     0xffffffff
setenv initrd_high 0xffffffff

# Boot Arguments
setenv bootargs "root=PARTUUID=${root_uuid} rootwait rw console=tty1 loglevel=4 video=DSI-1:720x720@60"

# Boot Source Detection
if test -z "${devtype}"; then setenv devtype mmc; fi
if test -z "${devnum}"; then setenv devnum 1; fi

# Set the DTB filename here (easy to swap for testing)
setenv fdtfile rk3326-r36ultra-linux.dtb

echo "Loading Alpine OS from ${devtype} ${devnum}:1..."
fatload ${devtype} ${devnum}:1 ${kernel_addr_r} /Image
fatload ${devtype} ${devnum}:1 ${ramdisk_addr_r} /uInitrd
load ${devtype} ${devnum}:1 ${fdt_addr_r} ${fdtfile}

echo "--- Starting Kernel ---"
booti ${kernel_addr_r} ${ramdisk_addr_r} ${fdt_addr_r}